<!DOCTYPE html>
<html lang="en">
<head>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>ClipFlow</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

        <header class="header">

    <script src="./renderer.js"></script>

</html>
