<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>ClipFlow</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <div>
                <h1>ClipFlow</h1>
                <p class="subtitle">
                    Everything you copy, ready when you need it.
                </p>
            </div>
        </header>

        <section class="toolbar" aria-label="Clipboard controls">
            <label class="search-field">
                <span class="sr-only">Search clipboard history</span>

                <input
                    id="search-input"
                    type="search"
                    placeholder="Search clipboard history..."
                >
            </label>

            <button
                id="clear-button"
                class="clear-button"
                type="button"
            >Clear History</button>
        </section>

        <section
        id="clipboard-list"
        class="clipboard-list"
        aria-live="polite"
        ></section>
    </main>

    <script src="./renderer.js"></script>
</body>
</html>
